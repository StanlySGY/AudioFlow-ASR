<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AudioFlow-ASR · 长音频转写</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel-2:#1f232c; --border:#272c37;
    --fg:#e7ebf0; --muted:#8b95a7; --accent:#5b9dff; --accent-2:#3b7bd9;
    --ok:#3fbf7f; --err:#ef5a5a; --warn:#e2b13a;
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  header .sub { color: var(--muted); font-size: 12px; margin-left: auto; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }

  /* Upload */
  .drop {
    border: 1.5px dashed #344056; border-radius: 10px;
    padding: 36px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
    color: var(--muted);
  }
  .drop:hover, .drop.drag { border-color: var(--accent); background: #1a2030; color: var(--fg); }
  .drop strong { color: var(--fg); }
  .drop small { display: block; margin-top: 6px; font-size: 12px; }

  /* Status */
  .row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .row > * { flex: 0 0 auto; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
  }
  .pill b { color: var(--fg); font-weight: 500; }
  .pill.s-done { color: var(--ok); border-color: #224434; }
  .pill.s-failed { color: var(--err); border-color: #4a2727; }
  .pill.s-transcribing, .pill.s-splitting, .pill.s-preprocessing, .pill.s-merging { color: var(--warn); border-color: #4a3d1a; }

  .bar { height: 6px; flex: 1 1 240px; background: #232936; border-radius: 999px; overflow: hidden; min-width: 200px; }
  .bar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width .3s; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin: 4px 0 12px; }
  .tab { padding: 8px 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
  .tab.active { color: var(--fg); border-color: var(--accent); }
  .pane { display: none; }
  .pane.active { display: block; }

  /* Segments table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 12px; letter-spacing: .3px; text-transform: uppercase; }
  td.id, td.range { font-family: var(--mono); color: var(--muted); white-space: nowrap; }
  td.text { color: var(--fg); }
  td.text.err { color: var(--err); }
  tbody tr { animation: fadeIn .25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: none; } }
  .empty { padding: 28px; text-align: center; color: var(--muted); font-size: 13px; }

  /* Final transcript */
  textarea#fullText {
    width: 100%; min-height: 280px; padding: 14px;
    background: var(--panel-2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; resize: vertical;
    font: 14px/1.7 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--fg);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0c1019; font-weight: 500; }
  button.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  button:disabled { opacity: .5; cursor: not-allowed; }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 36px; }
  footer a { color: var(--muted); }
  .hidden { display: none !important; }

  /* Settings panel */
  details.settings { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; }
  details.settings > summary { padding: 14px 18px; cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; gap: 10px; }
  details.settings > summary::-webkit-details-marker { display: none; }
  details.settings > summary::before { content: "▸"; transition: transform .15s; color: var(--muted); }
  details.settings[open] > summary::before { transform: rotate(90deg); }
  details.settings > summary b { font-weight: 500; }
  details.settings > summary .sub { color: var(--muted); font-size: 12px; margin-left: auto; }
  .settings-body { padding: 0 18px 16px; }
  .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px 18px; font-size: 13px; }
  .settings-grid .kv { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #232936; }
  .settings-grid .kv span:first-child { color: var(--muted); }
  .settings-grid .kv span:last-child { font-family: var(--mono); color: var(--fg); text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; }
  .settings-grid .kv.warn span:last-child { color: var(--warn); }
  .ping-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .ping-status { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .ping-status.ok { color: var(--ok); }
  .ping-status.err { color: var(--err); }

  /* Override form */
  .overrides { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px 14px; margin-top: 12px; }
  .overrides label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .overrides input[type=text], .overrides input[type=number], .overrides select {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 13px;
    font-family: -apple-system, sans-serif;
  }
  .overrides input[type=text]::placeholder, .overrides input[type=number]::placeholder { color: #4a5466; }
  .overrides .check { flex-direction: row; align-items: center; gap: 8px; color: var(--fg); cursor: pointer; }
  .overrides .check input { width: 14px; height: 14px; }

  /* Segment row expand */
  tr.seg-row { cursor: pointer; }
  tr.seg-row:hover { background: #1a1f29; }
  tr.detail-row > td { padding: 0; border-bottom: 1px solid var(--border); }
  .seg-detail { padding: 12px 14px; background: #131720; }
  .seg-detail pre { margin: 0; max-height: 260px; overflow: auto; font-family: var(--mono); font-size: 11px; color: #b9c2d1; white-space: pre-wrap; word-break: break-all; }
  td.elapsed { font-family: var(--mono); color: var(--muted); white-space: nowrap; }

  /* Editable config form */
  .config-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px 14px; }
  .config-form label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .config-form label .ftitle { display: flex; justify-content: space-between; align-items: center; }
  .config-form label .badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; background: #2a3142; color: #b6c0d3; font-family: var(--mono); }
  .config-form label .badge.set { background: #1e3a2a; color: var(--ok); }
  .config-form input[type=text], .config-form input[type=password], .config-form input[type=number], .config-form select {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 13px;
    font-family: -apple-system, sans-serif;
  }
  .config-form input::placeholder { color: #4a5466; }
  .config-form .check { flex-direction: row; align-items: center; gap: 8px; color: var(--fg); cursor: pointer; }
  .config-form .check input { width: 14px; height: 14px; }
  .config-form .dirty input, .config-form .dirty select { border-color: var(--accent); }
  .save-toast { font-family: var(--mono); font-size: 12px; }
  .save-toast.ok { color: var(--ok); }
  .save-toast.err { color: var(--err); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="dot"></span>
    <h1>AudioFlow-ASR</h1>
    <span class="sub">长音频切分 · 流式转写</span>
  </header>

  <details class="settings" id="settingsPanel">
    <summary><b>服务配置</b><span class="sub" id="settingsSummary">点击展开 · 可编辑保存 · 测试连接</span></summary>
    <div class="settings-body">
      <form id="configForm" class="config-form" autocomplete="off"></form>
      <div class="ping-row">
        <button type="button" id="saveCfgBtn" class="primary">保存</button>
        <button type="button" id="resetCfgBtn">重置为 .env 默认</button>
        <button type="button" id="pingBtn">测试连接</button>
        <span class="ping-status" id="pingStatus">未测试</span>
      </div>
    </div>
  </details>

  <section class="card" id="uploadCard">
    <div id="drop" class="drop">
      <strong>点击选择 或 拖拽音频/视频文件到此处</strong>
      <small>支持 mp3 / wav / m4a / flac / aac / ogg / mp4 / mov / mkv · 最长 2h+</small>
      <input type="file" id="file" hidden accept="audio/*,video/*,.pcm">
    </div>
    <details style="margin-top: 14px;">
      <summary style="cursor: pointer; color: var(--muted); font-size: 13px; user-select: none;">▸ 仅本次任务覆盖（留空 = 用服务端默认）</summary>
      <div class="overrides">
        <label>Model<input type="text" id="ovModel" placeholder="qwen3-asr-flash"></label>
        <label>Language<input type="text" id="ovLanguage" placeholder="zh / en / auto"></label>
        <label>Split strategy
          <select id="ovSplit">
            <option value="">(默认)</option>
            <option value="fixed">fixed</option>
            <option value="silence">silence</option>
            <option value="overlap">overlap</option>
          </select>
        </label>
        <label>Chunk seconds<input type="number" id="ovChunk" placeholder="30" min="5" step="5"></label>
        <label>Overlap seconds<input type="number" id="ovOverlap" placeholder="2" min="0" step="0.5"></label>
        <label>Hotwords<input type="text" id="ovHotwords" placeholder="逗号分隔"></label>
        <label>Prompt hints<input type="text" id="ovHints" placeholder="自由文本"></label>
        <label class="check"><input type="checkbox" id="ovTimestamps">请求 word 时间戳</label>
      </div>
    </details>
  </section>

  <section class="card hidden" id="taskCard">
    <div class="row" style="margin-bottom: 14px;">
      <span class="pill">任务 <b id="taskId">—</b></span>
      <span class="pill" id="statusPill">状态 <b id="status">—</b></span>
      <span class="pill">分片 <b><span id="finSeg">0</span>/<span id="totalSeg">—</span></b></span>
      <span class="pill">时长 <b id="duration">—</b></span>
      <div class="bar"><div id="progress"></div></div>
      <button id="newBtn">新任务</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-pane="live">实时分片</div>
      <div class="tab" data-pane="final">完整文本</div>
    </div>

    <div class="pane active" id="pane-live">
      <table id="segTable">
        <thead><tr><th style="width:60px">ID</th><th style="width:130px">时间</th><th style="width:80px">耗时</th><th>识别文本</th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="empty" id="emptyHint">等待分片切分完成 …</div>
    </div>

    <div class="pane" id="pane-final">
      <textarea id="fullText" placeholder="任务完成后这里将显示拼接后的完整转写文本 …" readonly></textarea>
      <div class="actions">
        <button id="copyBtn">复制</button>
        <button id="downloadBtn">下载 .txt</button>
        <button id="jsonBtn">下载 .json</button>
        <button id="srtBtn">下载 .srt</button>
        <button id="vttBtn">下载 .vtt</button>
        <button id="tokenBtn" title="更改访问令牌">🔑</button>
      </div>
    </div>
  </section>

  <footer>
    <a href="/docs" target="_blank">API 文档</a> · <a href="https://github.com/StanlySGY/AudioFlow-ASR" target="_blank">GitHub</a>
  </footer>
</div>

<script>
const $ = (s) => document.querySelector(s);
const segs = new Map();
let taskId = null;
let es = null;
let pollTimer = null;
let authRequired = false;

const TOKEN_KEY = 'asr_token';
const getToken = () => localStorage.getItem(TOKEN_KEY) || '';
const setToken = (t) => { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); };

async function authedFetch(url, opts = {}) {
  const t = getToken();
  const headers = { ...(opts.headers || {}) };
  if (t) headers['Authorization'] = `Bearer ${t}`;
  const r = await fetch(url, { ...opts, headers });
  if (r.status === 401) {
    setToken('');
    const tok = prompt('需要访问令牌');
    if (tok) { setToken(tok); return authedFetch(url, opts); }
  }
  return r;
}
function sseUrl(path) {
  const t = getToken();
  return t ? `${path}?token=${encodeURIComponent(t)}` : path;
}

(async function initAuth() {
  try {
    const info = await fetch('/auth/info').then(r => r.json());
    authRequired = !!info.auth_required;
    if (authRequired && !getToken()) {
      const tok = prompt('需要访问令牌（已启用鉴权）');
      if (tok) setToken(tok);
    }
  } catch (e) { /* ignore */ }
  await loadConfig();
})();

const CONFIG_FIELDS = [
  // [key, label, type, options]
  ['asr_provider',          'Provider',         'select'],
  ['asr_model',             'Model',            'text'],
  ['asr_base_url',          'Base URL',         'text'],
  ['asr_api_key',           'API Key',          'secret'],
  ['asr_language',          'Language',         'text', { placeholder: 'zh / en / 留空 = auto' }],
  ['asr_timestamps',        'Word timestamps',  'bool'],
  ['asr_hotwords',          'Hotwords',         'text', { placeholder: '逗号分隔' }],
  ['asr_prompt_hints',      'Prompt hints',     'text'],
  ['asr_concurrency',       'Concurrency',      'int'],
  ['asr_max_retries',       'Max retries',      'int'],
  ['asr_retry_backoff',     'Retry backoff',    'float'],
  ['asr_timeout',           'ASR timeout (s)',  'float'],
  ['split_strategy',        'Split strategy',   'select-split'],
  ['split_chunk_seconds',   'Chunk seconds',    'float'],
  ['split_overlap_seconds', 'Overlap seconds',  'float'],
  ['silence_noise_db',      'Silence noise dB', 'float'],
  ['silence_min_duration',  'Silence min dur',  'float'],
  ['max_upload_bytes',      'Max upload bytes', 'int'],
  ['access_tokens',         'Access tokens',    'secret', { placeholder: '逗号分隔，留空 = 关闭鉴权' }],
];

const CFG_KEY_TO_API_KEY = {
  asr_provider: 'provider', asr_model: 'model', asr_base_url: 'base_url',
  asr_language: 'language', asr_timestamps: 'timestamps',
  asr_hotwords: 'hotwords', asr_prompt_hints: 'prompt_hints',
  asr_concurrency: 'concurrency', asr_max_retries: 'max_retries',
  asr_retry_backoff: 'retry_backoff', asr_timeout: 'timeout',
  split_strategy: 'split_strategy', split_chunk_seconds: 'chunk_seconds',
  split_overlap_seconds: 'overlap_seconds', silence_noise_db: 'silence_noise_db',
  silence_min_duration: 'silence_min_duration', max_upload_bytes: 'max_upload_bytes',
};

let _currentConfig = null;

function renderConfigForm(cfg) {
  _currentConfig = cfg;
  const form = $('#configForm');
  form.innerHTML = '';
  for (const [key, label, type, opts = {}] of CONFIG_FIELDS) {
    const wrap = document.createElement('label');
    wrap.dataset.key = key;
    wrap.dataset.type = type;
    const title = document.createElement('div');
    title.className = 'ftitle';
    title.innerHTML = `<span>${label}</span>`;
    wrap.appendChild(title);

    let input;
    const apiKey = CFG_KEY_TO_API_KEY[key];
    if (type === 'select') {
      input = document.createElement('select');
      for (const p of (cfg.available_providers || [])) {
        const opt = document.createElement('option');
        opt.value = opt.textContent = p;
        input.appendChild(opt);
      }
      input.value = cfg[apiKey] || '';
    } else if (type === 'select-split') {
      input = document.createElement('select');
      for (const v of ['fixed', 'silence', 'overlap']) {
        const opt = document.createElement('option');
        opt.value = opt.textContent = v;
        input.appendChild(opt);
      }
      input.value = cfg[apiKey] || 'silence';
    } else if (type === 'bool') {
      wrap.classList.add('check');
      input = document.createElement('input');
      input.type = 'checkbox';
      input.checked = !!cfg[apiKey];
      // for booleans we put the input first, label text already there
      title.remove();
      const tx = document.createElement('span');
      tx.textContent = label;
      wrap.appendChild(input);
      wrap.appendChild(tx);
    } else if (type === 'secret') {
      input = document.createElement('input');
      input.type = 'password';
      input.placeholder = opts.placeholder || '输入新值以更新，留空保持不变';
      const setFlag = key === 'asr_api_key' ? cfg.api_key_set : (cfg.access_tokens_count > 0);
      const badge = document.createElement('span');
      badge.className = 'badge' + (setFlag ? ' set' : '');
      badge.textContent = setFlag ? (key === 'access_tokens' ? `已设置 ${cfg.access_tokens_count} 个` : '已设置') : '未设置';
      title.appendChild(badge);
    } else if (type === 'int' || type === 'float') {
      input = document.createElement('input');
      input.type = 'number';
      if (type === 'float') input.step = '0.1';
      input.value = cfg[apiKey] ?? '';
    } else {
      input = document.createElement('input');
      input.type = 'text';
      input.value = cfg[apiKey] ?? '';
      if (opts.placeholder) input.placeholder = opts.placeholder;
    }
    if (type !== 'bool') wrap.appendChild(input);

    const markDirty = () => { wrap.classList.add('dirty'); input.dataset.touched = 'yes'; };
    input.addEventListener('input', markDirty);
    input.addEventListener('change', markDirty);

    form.appendChild(wrap);
  }
  $('#settingsSummary').textContent = `${cfg.provider} · ${cfg.model} · ${cfg.base_url}`;
}

function collectConfigDiff() {
  const out = {};
  document.querySelectorAll('#configForm label').forEach(wrap => {
    const key = wrap.dataset.key;
    const type = wrap.dataset.type;
    const input = wrap.querySelector('input, select');
    if (!input || !input.dataset.touched) return;
    if (type === 'secret') {
      // empty = leave unchanged (don't send); explicit clear must be done via reset
      const v = input.value;
      if (v !== '') out[key] = v;
      return;
    }
    if (type === 'bool') { out[key] = input.checked; return; }
    if (type === 'int') {
      const n = parseInt(input.value, 10);
      if (Number.isFinite(n)) out[key] = n;
      return;
    }
    if (type === 'float') {
      const f = parseFloat(input.value);
      if (Number.isFinite(f)) out[key] = f;
      return;
    }
    // text / select / select-split
    out[key] = input.value;
  });
  return out;
}

async function loadConfig() {
  try {
    const cfg = await authedFetch('/asr/config').then(r => r.json());
    renderConfigForm(cfg);
  } catch (e) { /* ignore */ }
}

$('#saveCfgBtn').addEventListener('click', async () => {
  const diff = collectConfigDiff();
  const status = $('#pingStatus');
  if (Object.keys(diff).length === 0) {
    status.className = 'ping-status'; status.textContent = '无改动';
    return;
  }
  status.className = 'ping-status'; status.textContent = '保存中…';
  try {
    const r = await authedFetch('/asr/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(diff),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `${r.status}`);
    }
    const cfg = await r.json();
    renderConfigForm(cfg);
    status.className = 'ping-status ok';
    status.textContent = `✓ 已保存 ${Object.keys(diff).length} 项`;
  } catch (e) {
    status.className = 'ping-status err';
    status.textContent = '✗ ' + e.message;
  }
});

$('#resetCfgBtn').addEventListener('click', async () => {
  if (!confirm('确认丢弃所有运行时改动，回到 .env 默认值？')) return;
  const status = $('#pingStatus');
  status.className = 'ping-status'; status.textContent = '重置中…';
  try {
    const r = await authedFetch('/asr/config/reset', { method: 'POST' });
    const cfg = await r.json();
    renderConfigForm(cfg);
    status.className = 'ping-status ok'; status.textContent = '✓ 已重置';
  } catch (e) {
    status.className = 'ping-status err'; status.textContent = '✗ ' + e.message;
  }
});

$('#pingBtn').addEventListener('click', async () => {
  const status = $('#pingStatus');
  status.className = 'ping-status';
  status.textContent = '测试中 …';
  $('#pingBtn').disabled = true;
  try {
    const r = await authedFetch('/asr/ping', { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      status.className = 'ping-status ok';
      status.textContent = `✓ ${data.elapsed_ms.toFixed(0)}ms · ${data.model}${data.got_words ? ' · words ✓' : ' · 无时间戳'}`;
    } else {
      status.className = 'ping-status err';
      status.textContent = `✗ ${data.elapsed_ms.toFixed(0)}ms · ${data.error || 'unknown error'}`;
    }
  } catch (e) {
    status.className = 'ping-status err';
    status.textContent = `✗ ${e.message}`;
  } finally {
    $('#pingBtn').disabled = false;
  }
});

const drop = $('#drop'), fileInput = $('#file');
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', (e) => {
  e.preventDefault(); drop.classList.remove('drag');
  if (e.dataTransfer.files[0]) submit(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => fileInput.files[0] && submit(fileInput.files[0]));

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + t.dataset.pane));
}));

$('#newBtn').addEventListener('click', reset);
$('#copyBtn').addEventListener('click', () => navigator.clipboard.writeText($('#fullText').value));
$('#downloadBtn').addEventListener('click', () => downloadFile(`${taskId}.txt`, $('#fullText').value, 'text/plain'));
$('#jsonBtn').addEventListener('click', async () => {
  if (!taskId) return;
  const r = await authedFetch(`/asr/task/${taskId}/result`); const txt = await r.text();
  downloadFile(`${taskId}.json`, txt, 'application/json');
});
$('#srtBtn').addEventListener('click', () => downloadSubtitle('srt'));
$('#vttBtn').addEventListener('click', () => downloadSubtitle('vtt'));
$('#tokenBtn').addEventListener('click', () => {
  const cur = getToken();
  const tok = prompt('访问令牌（留空清除）', cur);
  if (tok !== null) setToken(tok.trim());
});

async function downloadSubtitle(fmt) {
  if (!taskId) return;
  const r = await authedFetch(`/asr/task/${taskId}/subtitle?format=${fmt}`);
  if (!r.ok) { alert(`字幕下载失败: ${r.status}`); return; }
  downloadFile(`${taskId}.${fmt}`, await r.text(), fmt === 'srt' ? 'application/x-subrip' : 'text/vtt');
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

async function submit(file) {
  reset();
  $('#taskCard').classList.remove('hidden');
  $('#status').textContent = 'uploading';
  const fd = new FormData(); fd.append('file', file);
  // attach per-task overrides
  const ov = collectOverrides();
  for (const [k, v] of Object.entries(ov)) fd.append(k, v);
  try {
    const r = await authedFetch('/asr/task', { method: 'POST', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    taskId = data.task_id;
    $('#taskId').textContent = taskId;
    start();
  } catch (e) {
    $('#status').textContent = 'upload failed';
    setStatusClass('failed');
    alert('上传失败: ' + e.message);
  }
}

function collectOverrides() {
  const o = {};
  const add = (key, sel, parse) => {
    const v = $(sel).value.trim();
    if (v !== '') o[key] = parse ? parse(v) : v;
  };
  add('model', '#ovModel');
  add('language', '#ovLanguage');
  add('split_strategy', '#ovSplit');
  add('chunk_seconds', '#ovChunk');
  add('overlap_seconds', '#ovOverlap');
  add('hotwords', '#ovHotwords');
  add('prompt_hints', '#ovHints');
  const tsBox = $('#ovTimestamps');
  if (tsBox.indeterminate === false && tsBox.dataset.touched === 'yes') {
    o.timestamps = tsBox.checked ? 'true' : 'false';
  }
  return o;
}
// mark timestamps checkbox as touched so we send override only when user toggles it
$('#ovTimestamps').addEventListener('change', (e) => { e.target.dataset.touched = 'yes'; });

function start() {
  poll();
  es = new EventSource(sseUrl(`/asr/task/${taskId}/stream`));
  es.addEventListener('segment', (e) => {
    const seg = JSON.parse(e.data);
    segs.set(seg.segment_id, seg);
    $('#finSeg').textContent = [...segs.values()].filter(s => s.is_final).length;
    renderSegs();
  });
  es.addEventListener('done', async () => {
    if (es) { es.close(); es = null; }
    if (pollTimer) clearTimeout(pollTimer);
    const info = await authedFetch(`/asr/task/${taskId}`).then(r => r.json()).catch(() => null);
    if (info) { $('#status').textContent = info.status; setStatusClass(info.status); $('#progress').style.width = '100%'; }
    if (info && info.status === 'done') {
      const res = await authedFetch(`/asr/task/${taskId}/result`).then(r => r.json());
      $('#fullText').value = res.text || '';
      $('#duration').textContent = res.duration ? fmtDur(res.duration) : '—';
      switchTab('final');
    }
  });
  es.onerror = () => { if (es) { es.close(); es = null; } };
}

async function poll() {
  if (!taskId) return;
  try {
    const info = await authedFetch(`/asr/task/${taskId}`).then(r => r.json());
    $('#status').textContent = info.status;
    setStatusClass(info.status);
    if (info.total_segments > 0) { $('#totalSeg').textContent = info.total_segments; $('#emptyHint').classList.add('hidden'); }
    $('#progress').style.width = ((info.progress || 0) * 100).toFixed(1) + '%';
    if (info.status !== 'done' && info.status !== 'failed') pollTimer = setTimeout(poll, 1000);
  } catch (e) { pollTimer = setTimeout(poll, 2000); }
}

function renderSegs() {
  const tbody = $('#segTable tbody');
  const rows = [...segs.values()].sort((a, b) => a.segment_id - b.segment_id);
  if (rows.length) $('#emptyHint').classList.add('hidden');
  tbody.innerHTML = rows.map(s => {
    const elapsed = s.elapsed_ms ? `${s.elapsed_ms.toFixed(0)}ms` : '—';
    return `
    <tr class="seg-row" data-seg="${s.segment_id}">
      <td class="id">#${s.segment_id}</td>
      <td class="range">${fmtTime(s.start)} – ${fmtTime(s.end)}</td>
      <td class="elapsed">${elapsed}</td>
      <td class="text ${s.error ? 'err' : ''}">${esc(s.error ? '⚠ ' + s.error : (s.text || '…'))}</td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('tr.seg-row').forEach(tr => tr.addEventListener('click', () => toggleSegDetail(tr)));
}

async function toggleSegDetail(tr) {
  const segId = tr.dataset.seg;
  const next = tr.nextElementSibling;
  if (next && next.classList.contains('detail-row') && next.dataset.for === segId) {
    next.remove();
    return;
  }
  // remove other open detail rows
  document.querySelectorAll('tr.detail-row').forEach(r => r.remove());

  const row = document.createElement('tr');
  row.className = 'detail-row';
  row.dataset.for = segId;
  row.innerHTML = `<td colspan="4"><div class="seg-detail"><pre>加载中…</pre></div></td>`;
  tr.after(row);

  try {
    const data = await authedFetch(`/asr/task/${taskId}/segments/${segId}/raw`).then(r => r.json());
    row.querySelector('pre').textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    row.querySelector('pre').textContent = '加载失败: ' + e.message;
  }
}

function setStatusClass(status) {
  const p = $('#statusPill');
  p.className = 'pill s-' + status;
}

function fmtTime(s) {
  const m = Math.floor(s / 60), sec = (s % 60).toFixed(1);
  return `${String(m).padStart(2, '0')}:${sec.padStart(4, '0')}`;
}
function fmtDur(s) {
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = Math.floor(s % 60);
  return h ? `${h}h${m}m` : `${m}m${sec}s`;
}
function esc(s) { return (s || '').replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c])); }
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.dataset.pane === name));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + name));
}

function reset() {
  if (es) { es.close(); es = null; }
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  segs.clear(); taskId = null;
  $('#segTable tbody').innerHTML = '';
  $('#fullText').value = '';
  $('#progress').style.width = '0%';
  $('#finSeg').textContent = '0';
  $('#totalSeg').textContent = '—';
  $('#duration').textContent = '—';
  $('#status').textContent = '—';
  $('#statusPill').className = 'pill';
  $('#taskId').textContent = '—';
  $('#emptyHint').classList.remove('hidden');
  fileInput.value = '';
  switchTab('live');
}
</script>
</body>
</html>
